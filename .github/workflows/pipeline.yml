name: Tourism MLOps Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:

  # ── Step 1: Register raw data on HF Hub ────────────────────────────────────
  data-registration:
    name: 1 - Data Registration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install huggingface_hub datasets

      - name: Run data registration script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/data_register.py

  # ── Step 2: Data preparation ────────────────────────────────────────────────
  data-preparation:
    name: 2 - Data Preparation
    needs: data-registration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install huggingface_hub datasets scikit-learn pandas
      - name: Run data preparation script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/prep.py

  # ── Step 3: Model training ──────────────────────────────────────────────────
  model-training:
    name: 3 - Model Training
    needs: data-preparation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install huggingface_hub datasets scikit-learn xgboost mlflow pandas joblib
      - name: Run training script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/train.py

  # ── Step 4: Deploy to Hugging Face Space ───────────────────────────────────
  model-deployment:
    name: 4 - Model Deployment
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install huggingface_hub
      - name: Push deployment files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/hosting/hosting.py